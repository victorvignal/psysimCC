<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f0e8; font-family: 'Caveat', cursive; }

  /* ── Sketchy base elements ── */
  .wf { background: #fafaf7; font-family: 'Caveat', cursive; color: #1a1a1a; position: relative; overflow: hidden; }

  .wf-box {
    border: 2px solid #1a1a1a;
    border-radius: 3px;
    position: absolute;
  }
  .wf-box.fill { background: #e8e4dc; }
  .wf-box.dark { background: #1a1a1a; }
  .wf-box.mid { background: #c9c4bb; }
  .wf-box.accent { background: #d4e8d4; border-color: #4a7a4a; }
  .wf-box.accent2 { background: #d4dce8; border-color: #4a5a7a; }
  .wf-box.warn { background: #f0e0c0; border-color: #8a6a2a; }

  .wf-text {
    position: absolute;
    font-family: 'Caveat', cursive;
    line-height: 1.2;
    color: #1a1a1a;
  }
  .wf-text.sm { font-size: 11px; }
  .wf-text.md { font-size: 14px; }
  .wf-text.lg { font-size: 18px; font-weight: 600; }
  .wf-text.xl { font-size: 22px; font-weight: 700; }
  .wf-text.muted { color: #888; }
  .wf-text.mono { font-family: 'Space Mono', monospace; font-size: 10px; }

  .wf-divider {
    position: absolute;
    background: #1a1a1a;
  }
  .wf-divider.h { height: 2px; }
  .wf-divider.v { width: 2px; }

  .wf-pill {
    position: absolute;
    border: 1.5px solid #1a1a1a;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat', cursive;
    font-size: 12px;
  }

  .wf-dot {
    position: absolute;
    border-radius: 50%;
    background: #1a1a1a;
    width: 6px; height: 6px;
  }

  .wf-avatar {
    position: absolute;
    border: 2px solid #1a1a1a;
    border-radius: 50%;
    background: #e8e4dc;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .wf-bubble {
    position: absolute;
    border: 2px solid #1a1a1a;
    border-radius: 12px;
    background: #fafaf7;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'Caveat', cursive;
    line-height: 1.3;
  }
  .wf-bubble.patient { background: #e8e4dc; border-radius: 2px 12px 12px 12px; }
  .wf-bubble.therapist { background: #d4dce8; border-radius: 12px 2px 12px 12px; }
  .wf-bubble.supervisor { background: #d4e8d4; border-radius: 12px 12px 12px 2px; }

  .badge {
    position: absolute;
    border: 1.5px solid currentColor;
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
  }
  .badge.iniciante { color: #4a7a4a; background: #d4e8d4; }
  .badge.intermediario { color: #7a6a2a; background: #f0e0c0; }
  .badge.avancado { color: #7a2a2a; background: #f0d4d4; }

  /* hatching for placeholder images */
  .hatch {
    position: absolute;
    background-image: repeating-linear-gradient(
      45deg, #ccc 0, #ccc 1px, transparent 0, transparent 50%
    );
    background-size: 6px 6px;
    background-color: #e8e4dc;
    border: 2px solid #aaa;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 4px;
  }
</style>
</head>
